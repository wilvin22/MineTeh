<!DOCTYPE html>
<html>
<head>
    <title>API Path Test</title>
</head>
<body>
    <h1>API Path Test from admin/ folder</h1>
    <button onclick="testRelative()">Test ../api/admin-rider-action.php</button>
    <button onclick="testAbsolute()">Test /api/admin-rider-action.php</button>
    <button onclick="testFull()">Test Full URL</button>
    <div id="result"></div>

    <script>
        function testRelative() {
            test('../api/admin-rider-action.php', 'Relative Path');
        }

        function testAbsolute() {
            test('/api/admin-rider-action.php', 'Absolute Path');
        }

        function testFull() {
            test('https://mineteh.infinityfreeapp.com/api/admin-rider-action.php', 'Full URL');
        }

        function test(url, label) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing ' + label + ': ' + url + '</p>';
            
            console.log('Testing:', url);
            
            fetch(url, {
                method: 'POST',
                body: new FormData()
            })
            .then(response => {
                console.log('Response status:', response.status);
                resultDiv.innerHTML += '<p>Status: ' + response.status + '</p>';
                return response.text();
            })
            .then(text => {
                console.log('Response:', text);
                resultDiv.innerHTML += '<pre>' + text + '</pre>';
            })
            .catch(error => {
                console.error('Error:', error);
                resultDiv.innerHTML += '<p style="color:red;">Error: ' + error.message + '</p>';
            });
        }
    </script>
</body>
</html>
